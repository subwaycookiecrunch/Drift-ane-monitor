[pytest]
testpaths = tests
asyncio_mode = auto
markers =
    slow: marks tests as slow (> 1s)
    hardware: marks tests requiring real Apple Silicon hardware
    integration: marks integration tests requiring full process
addopts =
    --strict-markers
    -v
    --tb=short
    --cov=.
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=85
filterwarnings =
    ignore::DeprecationWarning
    ignore::ResourceWarning
